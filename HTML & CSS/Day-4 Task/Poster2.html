<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>

    <style>
        
        body {
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

       
        .card {
            width: 350px;
            background-color: #ffffff;

            margin: 80px auto;   
            padding: 30px;      

            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);

            text-align: center;
        }

       
        .card img {
            width: 120px;
            height: 120px;

            border-radius: 50%;
            border: 3px solid #ddd;

            margin-bottom: 15px;
        }

       
        .card h2 {
            margin: 10px 0;
        }

        .card h4 {
            color: gray;
            margin: 5px 0 15px;
        }

        .card p {
            margin-bottom: 25px;
            line-height: 1.5;
        }

    
        .card button {
            width: 100%;
            padding: 12px;

            background-color: #1e73d8;
            color: white;

            border: none;
            border-radius: 8px;

            font-size: 16px;
            cursor: pointer;
        }

        .card button:hover {
            background-color: #155bb5;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="https://via.placeholder.com/120" alt="Profile Picture">

        <h2>John Doe</h2>
        <h4>Web Developer</h4>

        <p>
            A simple, clean profile card design using the CSS box model.
        </p>

        <button>Contact</button>
    </div>

</body>
</html>
</body>
</html>
