<script>

// Task 1 — E-Commerce Product Filter
// Fetch all products
// Filter products whose:
// price > 100
// category = "electronics"

fetch("https://fakestoreapi.com/products/")
.then(res => res.json())
.then(data => {

    let result = data.filter(product =>
        product.price > 100 &&
        product.category === "electronics"
    )

    result.forEach(product => {
        console.log(product.title)
        console.log(product.price)
    })

})

// Output:
// Product title
// Product price




// Task 2 — Online Shopping Cart Total
// Calculate total bill amount using reduce()

let cart = [
  {product:"Shoes", price:2000, qty:2},
  {product:"Watch", price:1500, qty:1},
  {product:"Bag", price:1000, qty:3}
]

let total = cart.reduce((acc,item)=>{
    return acc + (item.price * item.qty)
},0)

console.log(total)

// Output:
// 8500

// Task 7 — Movie Booking Timer
// Create countdown from 10 to 0

},1000)

// Task 17 — Employee Attendance

},{})

// Task 18 — Banking System
// Create deposit(), withdraw(), checkBalance()

let balance = 5000

function deposit(amount){

    balance += amount

    console.log("Deposited :", amount)

}

function withdraw(amount){

    balance -= amount

    console.log("Withdrawn :", amount)

}

function checkBalance(){

    console.log("Balance :", balance)

}

deposit(2000)

withdraw(1000)

checkBalance()

// Output:

// Withdrawn : 1000

// Task 20 — Real API Product Table
// Fetch API and print title, price, image
// Inside HTML cards dynamically

fetch("https://fakestoreapi.com/products/")
.then(res => res.json())
.then(data => {

    data.map(product => {

        document.body.innerHTML += `

        <div style="
            border:1px solid black;
            padding:10px;
            margin:10px;
            width:250px;
        ">

            <img src="${product.image}" width="100">

            <h3>${product.title}</h3>

            <p>₹ ${product.price}</p>

        </div>

        `

    })

})

// Output:
// Product cards displayed in browser




// Task 21 — Build Small E-Commerce Logic
// Fetch products
// Filter by category
// Sort by price
// Search product
// Add to cart
// Total calculation

let cartItems = []

fetch("https://fakestoreapi.com/products/")
.then(res => res.json())
.then(data => {

    // Filter category

    let electronics = data.filter(product =>
        product.category === "electronics"
    )

    console.log(electronics)

    // Sort by price

    let sorted = data.sort((a,b)=>
        a.price - b.price
    )

    console.log(sorted)

    // Search product

    let search = data.filter(product =>
        product.title.toLowerCase().includes("shirt")
    )

    console.log(search)

    // Add to cart

    cartItems.push(data[0])
    cartItems.push(data[1])

    console.log(cartItems)

    // Total calculation

    let total = cartItems.reduce((acc,item)=>
        acc + item.price
    ,0)

    console.log("Total :", total)

})

// Output:
// Filtered products
// Sorted products
// Search results
// Cart items
// Total amount
